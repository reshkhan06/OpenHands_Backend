<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify your email</title>
  <style>
    * {{ box-sizing: border-box; }}
    body {{ margin: 0; padding: 0; background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }}
    .wrapper {{ padding: 24px 16px; min-height: 100vh; }}
    .container {{ max-width: 520px; margin: 0 auto; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }}
    .header {{ background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); color: #fff; padding: 28px 24px; text-align: center; }}
    .header h1 {{ margin: 0; font-size: 1.5rem; font-weight: 700; }}
    .header p {{ margin: 6px 0 0; opacity: 0.95; font-size: 0.9rem; }}
    .body {{ padding: 32px 24px; color: #334155; line-height: 1.6; }}
    .body h2 {{ margin: 0 0 16px; font-size: 1.2rem; color: #0f172a; }}
    .body p {{ margin: 0 0 16px; font-size: 1rem; }}
    .btn {{ display: inline-block; background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); color: #fff !important; text-decoration: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; font-size: 1rem; margin: 8px 0 20px; box-shadow: 0 2px 8px rgba(13, 148, 136, 0.35); }}
    .btn:hover {{ opacity: 0.95; }}
    .muted {{ font-size: 0.875rem; color: #64748b; margin-top: 24px; }}
    .footer {{ padding: 20px 24px; background: #f8fafc; font-size: 0.8rem; color: #64748b; text-align: center; }}
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1>OpenHands</h1>
        <p>Donation &amp; Pickup</p>
      </div>
      <div class="body">
        <h2>Hello {name},</h2>
        <p>Thanks for registering! Please verify your email address by clicking the button below.</p>
        <p><a href="{url}" class="btn">Verify Email</a></p>
        <p class="muted">If you did not create this account, you can safely ignore this email.</p>
      </div>
      <div class="footer">
        This email was sent by OpenHands. Please do not reply directly to this message.
      </div>
    </div>
  </div>
</body>
</html>
